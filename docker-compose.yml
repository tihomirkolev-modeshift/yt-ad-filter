services:
  yt-ad-filter:
    build: .
    container_name: yt-ad-filter
    restart: unless-stopped
    network_mode: host          # required for transparent/TPROXY mode; also exposes 8080+8888 on host
    cap_add:
      - NET_ADMIN               # required for IP_TRANSPARENT socket option
    environment:
      - MITM_MODE=transparent   # change to 'regular' for explicit proxy mode
    volumes:
      - mitmproxy-data:/root/.mitmproxy

volumes:
  mitmproxy-data:

