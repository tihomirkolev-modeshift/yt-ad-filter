services:
  yt-ad-filter:
    build: .
    container_name: yt-ad-filter
    restart: unless-stopped
    ports:
      - "8080:8080"   # proxy
      - "8888:8888"   # CA cert download
    environment:
      - MITM_MODE=transparent
      # - DEBUG=1        # uncomment to enable verbose logging (docker compose logs -f)
    volumes:
      - mitmproxy-data:/root/.mitmproxy

volumes:
  mitmproxy-data:

